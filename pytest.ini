[pytest]
testpaths = src tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=src --cov-report=term-missing
markers =
    unit: 단위 테스트 (빠른 실행, 외부 의존 없음)
    integration: 통합 테스트 (monkeypatch 기반 전체 흐름)
    bench: 벤치마크 (CI에서는 제외)
    requires_model: 실제 모델 파일 필요
