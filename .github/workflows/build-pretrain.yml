name: Build Connector Vision Pretrain Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/run_pretrain_local.py"
      - "scripts/run_pretrain.py"
      - "src/config_loader.py"
      - "src/training/**"
      - "src/gui/panels/training_panel.py"
      - "pretrain_data_test/**"
      - "assets/config.json"
      - "assets/models/*.pt"
      - "assets/launchers/start_pretrain.bat"
      - "assets/launchers/INSTALL_GUIDE.txt"
      - "assets/launchers/MERGE_GUIDE.txt"
      - "pretrain_exe.spec"
      - "tests/unit/test_dataset_manager.py"
      - "tests/unit/test_pretrain_pipeline.py"
      - "tests/unit/test_training_manager.py"
      - "tests/unit/test_training_manager_line_profile.py"
      - ".github/workflows/build-pretrain.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-pretrain:
    name: Pretrain artifact
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html
          python -m pip install -r requirements-dev.txt

      - name: Pretrain preflight tests
        shell: pwsh
        run: |
          python -m pytest `
            tests/unit/test_dataset_manager.py `
            tests/unit/test_pretrain_pipeline.py `
            tests/unit/test_training_manager.py `
            tests/unit/test_training_manager_line_profile.py `
            tests/unit/test_config_loader.py `
            -q --tb=short --no-header --timeout=120

      - name: Ensure YOLO26x base weights exist
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt')"
          }
          if (-not (Test-Path "assets\models\yolo26x_pretrained.pt")) {
            throw "Missing assets/models/yolo26x_pretrained.pt"
          }

      - name: Create pretrain dataset manifest (Tier A real datasets only)
        shell: pwsh
        run: |
          $manifest = @"
          sources:
            - name: msd
              enabled: true
              license: GPL
              format: yolo
              description: MSD - Smartphone surface defects
              class_map:
                oled_inspection_top_view: 0
                connector_pin_cluster_upper: 1
                connector_pin_cluster_lower: 2
                connector_pin_mold_left: 3
                connector_pin_mold_right: 4
                oled_panel_marker: 5
            - name: ssgd
              enabled: true
              license: MIT
              format: yolo
              description: SSGD - Smartphone screen glass defects
              class_map:
                oled_inspection_top_view: 0
                connector_pin_cluster_upper: 1
                connector_pin_cluster_lower: 2
                connector_pin_mold_left: 3
                connector_pin_mold_right: 4
                oled_panel_marker: 5
          "@
          $manifest | Out-File -FilePath pretrain_dataset_manifest.yaml -Encoding utf8

      - name: Download Tier A real datasets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "pretrain_data" -Force | Out-Null
          New-Item -ItemType Directory -Path "pretrain_data/images" -Force | Out-Null
          New-Item -ItemType Directory -Path "pretrain_data/labels" -Force | Out-Null
          
          # Download MSD dataset (스마트폰 표면 결함)
          Write-Host "Downloading MSD dataset (smartphone surface defects)..."
          $msdTemp = New-TemporaryFile -ChildPath "msd" -Force
          git clone --depth 1 https://github.com/jianzhang96/MSD.git $msdTemp 2>&1 | Select-Object -First 5
          if (Test-Path "$msdTemp/train/images") {
            Get-ChildItem "$msdTemp/train/images/*.jpg" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ "pretrain_data/images/" -ErrorAction SilentlyContinue
            }
            Get-ChildItem "$msdTemp/train/labels/*.txt" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ "pretrain_data/labels/" -ErrorAction SilentlyContinue
            }
          }
          
          # Download SSGD dataset (스크린 글라스 결함)
          Write-Host "Downloading SSGD dataset (screen glass defects)..."
          $ssgdTemp = New-TemporaryFile -ChildPath "ssgd" -Force
          git clone --depth 1 https://github.com/VincentHancoder/SSGD.git $ssgdTemp 2>&1 | Select-Object -First 5
          if (Test-Path "$ssgdTemp/train/images") {
            Get-ChildItem "$ssgdTemp/train/images/*.jpg" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ "pretrain_data/images/" -ErrorAction SilentlyContinue
            }
            Get-ChildItem "$ssgdTemp/train/labels/*.txt" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ "pretrain_data/labels/" -ErrorAction SilentlyContinue
            }
          }
          
          # Verify dataset was downloaded
          $imgCount = (Get-ChildItem "pretrain_data/images/*.jpg" -ErrorAction SilentlyContinue).Count
          $lblCount = (Get-ChildItem "pretrain_data/labels/*.txt" -ErrorAction SilentlyContinue).Count
          Write-Host "Downloaded $imgCount images and $lblCount labels"
          
          if ($imgCount -lt 10) {
            throw "Not enough real dataset images downloaded. Expected >= 10, got $imgCount"
          }

      - name: Verify compact pretrain script
        shell: pwsh
        run: |
          python -c "import scripts.run_pretrain_compact; print('Compact pretrain script import OK')"
          python scripts/run_pretrain_compact.py --help | Out-String -Stream | Select-Object -First 10

      - name: Verify YOLO26x loads
        shell: cmd
        run: python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('YOLO26x classes:', len(m.names))"


      - name: Build pretrain EXE with PyInstaller
        shell: cmd
        run: pyinstaller pretrain_exe.spec --distpath dist-pretrain --clean

      - name: Verify EXE built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist-pretrain\connector_pretrain.exe")) {
            throw "Pretrain EXE build failed - file not found"
          }

      - name: Assemble pretrain bundle
        shell: pwsh
        run: |
          $pkg = "connector_agent_pretrain"
          if (Test-Path $pkg) {
            Remove-Item -LiteralPath $pkg -Recurse -Force
          }

          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\pretrain_data" -Force | Out-Null

          $datasetSource = "pretrain_data"
          if (-not (Test-Path $datasetSource)) {
            $datasetSource = "pretrain_data_test"
          }
          if (-not (Test-Path $datasetSource)) {
            throw "No pretrain dataset source found"
          }

          Copy-Item "dist-pretrain\connector_pretrain.exe" "$pkg\connector_pretrain.exe"
          Copy-Item "assets\config.json" "$pkg\assets\config.json"
          Copy-Item "assets\models\yolo26x.pt" "$pkg\assets\models\yolo26x.pt"
          Copy-Item "assets\models\yolo26x_pretrained.pt" "$pkg\assets\models\yolo26x_pretrained.pt"
          Copy-Item "assets\launchers\start_pretrain.bat" "$pkg\start_pretrain.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "$datasetSource\*" "$pkg\pretrain_data" -Recurse -Force

      - name: Upload pretrain artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-pretrain
          path: connector_agent_pretrain/
          retention-days: 90
