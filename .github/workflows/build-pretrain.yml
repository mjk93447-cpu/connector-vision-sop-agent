name: Build Connector Vision Pretrain Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/prepare_pretrain_data.py"
      - "scripts/run_pretrain_local.py"
      - "src/training/compact_pretrain_pipeline.py"
      - "src/training/dataset_converter.py"
      - "src/config_loader.py"
      - "assets/config.json"
      - "assets/models/*.pt"
      - "assets/launchers/start_pretrain.bat"
      - "assets/launchers/INSTALL_GUIDE.txt"
      - "assets/launchers/MERGE_GUIDE.txt"
      - "pretrain_exe.spec"
      - "tests/unit/test_compact_pretrain_pipeline.py"
      - ".github/workflows/build-pretrain.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-pretrain:
    name: Pretrain artifact
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html
          python -m pip install -r requirements-dev.txt

      - name: Pretrain preflight tests
        shell: pwsh
        run: |
          python -m pytest `
            tests/unit/test_compact_pretrain_pipeline.py `
            tests/unit/test_config_loader.py `
            -q --tb=short --no-header --timeout=120

      - name: Prepare compact pretrain dataset
        shell: pwsh
        run: |
          python scripts/prepare_pretrain_data.py `
            --output-dir pretrain_data `
            --max-samples-per-source 400

      - name: Validate prepared dataset
        shell: pwsh
        run: |
          if (-not (Test-Path "pretrain_data\manifest.json")) {
            throw "Pretrain manifest was not created"
          }
          if (-not (Test-Path "pretrain_data\train\images")) {
            throw "Train split images folder is missing"
          }
          if (-not (Test-Path "pretrain_data\train\labels")) {
            throw "Train split labels folder is missing"
          }
          $imgCount = (Get-ChildItem "pretrain_data\train\images" -File | Measure-Object).Count
          $lblCount = (Get-ChildItem "pretrain_data\train\labels" -File | Measure-Object).Count
          if ($imgCount -lt 1 -or $lblCount -lt 1) {
            throw "Prepared dataset is empty after split"
          }
          Write-Host "Prepared dataset validated. train images=$imgCount labels=$lblCount"

      - name: Ensure YOLO26x base weights exist
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt')"
          }

      - name: Create pretrain dataset manifest (Tier A real datasets only)
        shell: pwsh
        run: |
          $manifest = @"
          sources:
            - name: msd
              enabled: true
              license: GPL
              format: yolo
              description: MSD - Smartphone surface defects
              class_map:
                oled_inspection_top_view: 0
                connector_pin_cluster_upper: 1
                connector_pin_cluster_lower: 2
                connector_pin_mold_left: 3
                connector_pin_mold_right: 4
                oled_panel_marker: 5
            - name: ssgd
              enabled: true
              license: MIT
              format: yolo
              description: SSGD - Smartphone screen glass defects
              class_map:
                oled_inspection_top_view: 0
                connector_pin_cluster_upper: 1
                connector_pin_cluster_lower: 2
                connector_pin_mold_left: 3
                connector_pin_mold_right: 4
                oled_panel_marker: 5
          "@
          $manifest | Out-File -FilePath pretrain_dataset_manifest.yaml -Encoding utf8

      - name: Download Tier A real datasets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "pretrain_data/images" -Force | Out-Null
          New-Item -ItemType Directory -Path "pretrain_data/labels" -Force | Out-Null
          
          # Download MSD dataset (스마트폰 표면 결함)
          Write-Host "Downloading MSD dataset (smartphone surface defects)..."
          $msdDir = (New-Item -ItemType Directory -Path "temp_datasets/msd" -Force).FullName
          try {
            git clone --depth 1 --quiet https://github.com/jianzhang96/MSD.git $msdDir 2>&1
            if (Test-Path "$msdDir/train/images") {
              Get-ChildItem "$msdDir/train/images" -Include "*.jpg","*.png" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "pretrain_data/images/" -ErrorAction SilentlyContinue
              }
              Get-ChildItem "$msdDir/train/labels" -Include "*.txt" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "pretrain_data/labels/" -ErrorAction SilentlyContinue
              }
              Write-Host "✓ MSD dataset loaded"
            }
          } catch {
            Write-Host "⚠ MSD download failed: $_"
          }
          
          # Download SSGD dataset (스크린 글라스 결함)
          Write-Host "Downloading SSGD dataset (screen glass defects)..."
          $ssgdDir = (New-Item -ItemType Directory -Path "temp_datasets/ssgd" -Force).FullName
          try {
            git clone --depth 1 --quiet https://github.com/VincentHancoder/SSGD.git $ssgdDir 2>&1
            if (Test-Path "$ssgdDir/train/images") {
              Get-ChildItem "$ssgdDir/train/images" -Include "*.jpg","*.png" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "pretrain_data/images/" -ErrorAction SilentlyContinue
              }
              Get-ChildItem "$ssgdDir/train/labels" -Include "*.txt" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName "pretrain_data/labels/" -ErrorAction SilentlyContinue
              }
              Write-Host "✓ SSGD dataset loaded"
            }
          } catch {
            Write-Host "⚠ SSGD download failed: $_"
          }
          
          # Verify and report dataset statistics
          $imgCount = (Get-ChildItem "pretrain_data/images" -Include "*.jpg","*.png" -ErrorAction SilentlyContinue | Measure-Object).Count
          $lblCount = (Get-ChildItem "pretrain_data/labels" -Include "*.txt" -ErrorAction SilentlyContinue | Measure-Object).Count
          Write-Host ""
          Write-Host "Dataset Summary:"
          Write-Host "  Images: $imgCount"
          Write-Host "  Labels: $lblCount"
          
          if ($imgCount -lt 5) {
            Write-Host "⚠ Warning: Limited real dataset images ($imgCount). Proceeding with available data."
          } else {
            Write-Host "✓ Real dataset ready for artifact bundling"
          }
          
          # Cleanup temporary directories
          Remove-Item -Path "temp_datasets" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Verify compact pretrain script
        shell: pwsh
        run: |
          python -c "import scripts.run_pretrain_compact; print('Compact pretrain script import OK')"
          python scripts/run_pretrain_compact.py --help | Out-String -Stream | Select-Object -First 10

      - name: Verify YOLO26x loads
        shell: cmd
        run: python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('YOLO26x classes:', len(m.names))"


      - name: Build pretrain EXE with PyInstaller
        shell: cmd
        run: pyinstaller pretrain_exe.spec --distpath dist-pretrain --clean

      - name: Verify EXE built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist-pretrain\connector_pretrain.exe")) {
            throw "Pretrain EXE build failed - file not found"
          }

      - name: Assemble pretrain bundle
        shell: pwsh
        run: |
          $pkg = "connector_agent_pretrain"
          if (Test-Path $pkg) {
            Remove-Item -LiteralPath $pkg -Recurse -Force
          }

          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\pretrain_data" -Force | Out-Null

          Copy-Item "dist-pretrain\connector_pretrain.exe" "$pkg\connector_pretrain.exe"
          Copy-Item "assets\config.json" "$pkg\assets\config.json"
          Copy-Item "assets\models\yolo26x.pt" "$pkg\assets\models\yolo26x.pt"
          Copy-Item "assets\launchers\start_pretrain.bat" "$pkg\start_pretrain.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "pretrain_data\*" "$pkg\pretrain_data" -Recurse -Force

          New-Item -ItemType File -Path "$pkg\pretrain_data\PLACE_PRETRAIN_DATA_HERE.txt" -Force | Out-Null
          $note = @(
            "Bundled compact PCB / electronics dataset for offline local pretraining."
            "This folder is prepared automatically during the pretrain artifact build."
          ) -join [Environment]::NewLine
          Set-Content -LiteralPath "$pkg\pretrain_data\PLACE_PRETRAIN_DATA_HERE.txt" -Encoding UTF8 -Value $note

      - name: Upload pretrain artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-pretrain
          path: connector_agent_pretrain/
          retention-days: 90
