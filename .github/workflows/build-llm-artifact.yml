name: Prepare Ollama LLM Artifact

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Single runner label. Use this for standard GitHub-hosted runners like ubuntu-latest."
        required: true
        default: "ubuntu-latest"
        type: string
      runner_labels_json:
        description: 'Optional JSON array of runner labels. Use this only for self-hosted or larger runners.'
        required: false
        default: ""
        type: string
      model_name:
        description: "Target Ollama model name"
        required: true
        default: "gemma4:26b-a4b-it-q4_K_M"
        type: string
      gguf_url:
        description: "Optional direct TurboQuant GGUF URL."
        required: false
        default: ""
        type: string
      gguf_manifest_url:
        description: "Optional split GGUF manifest URL. Use this for GitHub Release split parts."
        required: false
        default: ""
        type: string
      quantization_manifest_url:
        description: "Required JSON manifest URL describing the TurboQuant build provenance."
        required: true
        default: ""
        type: string
      chunk_size_bytes:
        description: "Per-file split size for staged model blobs"
        required: true
        default: "2000000000"
        type: string
      prepared_artifact_name:
        description: "Uploaded prepared artifact name"
        required: true
        default: "connector-agent-llm-prepared"
        type: string
      retention_days:
        description: "Retention days for the prepared artifact"
        required: true
        default: "7"
        type: string

jobs:
  build-llm-artifact:
    runs-on: ${{ inputs.runner_labels_json != '' && fromJSON(inputs.runner_labels_json) || inputs.runner_label }}
    permissions:
      contents: read
    env:
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_MODELS: ${{ github.workspace }}/.ollama_runtime/models
      OLLAMA_STAGING_ROOT: ${{ github.workspace }}/ollama_artifact_stage
      PREPARED_ARTIFACT_NAME: ${{ inputs.prepared_artifact_name }}
      TARGET_MODEL_NAME: ${{ inputs.model_name }}
      SOURCE_MODE: gguf-import
      QUANTIZATION_ORIGIN: turboquant
      TURBOQUANT_REQUIRED: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure Ollama runtime workspace exists
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path $env:OLLAMA_MODELS -Force | Out-Null
          New-Item -ItemType Directory -Path $env:OLLAMA_STAGING_ROOT -Force | Out-Null

      - name: Install Ollama when missing
        shell: pwsh
        run: |
          if (Get-Command ollama -ErrorAction SilentlyContinue) {
            Write-Host "Ollama already available."
            exit 0
          }
          if ($env:RUNNER_OS -eq "Windows") {
            winget install Ollama.Ollama --silent --accept-source-agreements --accept-package-agreements
          } else {
            bash -lc "curl -fsSL https://ollama.com/install.sh | sh"
          }
          if (-not (Get-Command ollama -ErrorAction SilentlyContinue)) {
            throw "Ollama installation failed."
          }

      - name: Start Ollama server
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            Start-Process -FilePath "ollama" -ArgumentList "serve"
          } else {
            Start-Process -FilePath "ollama" -ArgumentList "serve" -RedirectStandardOutput "ollama-serve.out" -RedirectStandardError "ollama-serve.err"
          }
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:11434/api/version" -UseBasicParsing -TimeoutSec 5 | Out-Null
              $ready = $true
              break
            } catch {
              Write-Host "Waiting for Ollama server to accept connections..."
            }
          }
          if (-not $ready) {
            if (Test-Path "ollama-serve.out") { Get-Content "ollama-serve.out" }
            if (Test-Path "ollama-serve.err") { Get-Content "ollama-serve.err" }
            throw "Ollama server did not become ready."
          }

      - name: Validate TurboQuant inputs
        shell: pwsh
        run: |
          $ggufUrl = "${{ inputs.gguf_url }}"
          $ggufManifestUrl = "${{ inputs.gguf_manifest_url }}"
          if ([string]::IsNullOrWhiteSpace($ggufUrl) -and [string]::IsNullOrWhiteSpace($ggufManifestUrl)) {
            throw "One of gguf_url or gguf_manifest_url is required."
          }
          if (-not [string]::IsNullOrWhiteSpace($ggufUrl) -and -not [string]::IsNullOrWhiteSpace($ggufManifestUrl)) {
            throw "Provide only one of gguf_url or gguf_manifest_url."
          }
          if (-not "${{ inputs.quantization_manifest_url }}") {
            throw "quantization_manifest_url is required. This workflow only accepts TurboQuant GGUF imports with provenance."
          }

      - name: Prepare model via TurboQuant GGUF import
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "gguf-import" -Force | Out-Null
          python scripts/fetch_remote_gguf.py `
            --output "gguf-import/model.gguf" `
            --gguf-url "${{ inputs.gguf_url }}" `
            --gguf-manifest-url "${{ inputs.gguf_manifest_url }}" `
            > "gguf-import/fetch_result.json"
          @'
          from pathlib import Path

          gguf = Path("gguf-import/model.gguf").resolve()
          modelfile = Path("gguf-import/Modelfile")
          modelfile.write_text(f"FROM {gguf.as_posix()}\n", encoding="utf-8")
          print(modelfile.read_text(encoding="utf-8"))
          '@ | python -
          ollama create "${{ inputs.model_name }}" -f "gguf-import/Modelfile"

      - name: Fetch quantization manifest
        shell: pwsh
        run: |
          @'
          import pathlib
          import urllib.request

          url = r"${{ inputs.quantization_manifest_url }}"
          target = pathlib.Path("gguf-import/quantization_manifest.json").resolve()
          target.parent.mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(url, target)
          print(target)
          '@ | python -

      - name: Validate TurboQuant provenance before import
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path

          gguf_path = Path("gguf-import/model.gguf")
          manifest_path = Path("gguf-import/quantization_manifest.json")
          fetch_result_path = Path("gguf-import/fetch_result.json")
          download_manifest_path = Path("gguf-import/gguf_download_manifest.json")

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          fetch_result = json.loads(fetch_result_path.read_text(encoding="utf-8"))
          download_manifest = (
              json.loads(download_manifest_path.read_text(encoding="utf-8"))
              if download_manifest_path.exists()
              else {}
          )

          expected_model = "${{ inputs.model_name }}"
          expected_family = expected_model.split(":", 1)[0].strip().lower()
          quant_suffix = expected_model.rsplit("-", 1)[-1].strip()
          expected_quant = quant_suffix[:1].upper() + quant_suffix[1:]

          required = [
              "model_name",
              "tool",
              "quantization_origin",
              "expected_family",
              "expected_quantization_level",
              "gguf_sha256",
              "gguf_size_bytes",
              "source_url",
              "reference_url",
          ]
          missing = [key for key in required if not str(manifest.get(key, "")).strip()]
          if missing:
              raise SystemExit(
                  "quantization_manifest.json missing required fields: " + ", ".join(missing)
              )
          tool = str(manifest.get("tool", "")).lower()
          origin = str(manifest.get("quantization_origin", "")).lower()
          if "turbo" not in tool and "turbo" not in origin:
              raise SystemExit("quantization_manifest.json must declare a TurboQuant origin.")
          if str(manifest.get("model_name", "")).strip() != expected_model:
              raise SystemExit("quantization_manifest.json model_name mismatch.")
          if str(manifest.get("expected_family", "")).strip().lower() != expected_family:
              raise SystemExit("quantization_manifest.json expected_family mismatch.")
          if str(manifest.get("expected_quantization_level", "")).strip().lower() != expected_quant.lower():
              raise SystemExit("quantization_manifest.json expected_quantization_level mismatch.")

          actual_size = gguf_path.stat().st_size
          actual_sha = str(fetch_result.get("output_sha256", "")).strip().lower()
          if not actual_sha:
              raise SystemExit("fetch_result.json is missing output_sha256.")
          if actual_size != int(manifest.get("gguf_size_bytes", 0)):
              raise SystemExit("Downloaded GGUF size does not match quantization manifest.")
          if actual_sha != str(manifest.get("gguf_sha256", "")).strip().lower():
              raise SystemExit("Downloaded GGUF sha256 does not match quantization manifest.")

          if download_manifest:
              if str(download_manifest.get("sha256", "")).strip().lower() != actual_sha:
                  raise SystemExit("gguf_download_manifest.json sha256 mismatch.")
              if int(download_manifest.get("size_bytes", 0)) != actual_size:
                  raise SystemExit("gguf_download_manifest.json size mismatch.")
          '@ | python -

      - name: Capture show output
        shell: pwsh
        run: |
          ollama show "${{ inputs.model_name }}" | Out-File -FilePath "ollama_show.txt" -Encoding utf8
          @'
          import json
          import os
          import urllib.request

          model = os.environ["TARGET_MODEL_NAME"]
          req = urllib.request.Request(
              "http://127.0.0.1:11434/api/show",
              data=json.dumps({"model": model}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=120) as resp:
              data = json.loads(resp.read().decode("utf-8"))
          with open("ollama_show.json", "w", encoding="utf-8") as fh:
              json.dump(data, fh, ensure_ascii=False, indent=2)
          '@ | python -

      - name: Resolve active Ollama models root and metadata
        shell: pwsh
        run: |
          @'
          import json
          import os
          from pathlib import Path

          show_json = json.loads(Path("ollama_show.json").read_text(encoding="utf-8"))
          candidates = []

          parent_model = str(show_json.get("details", {}).get("parent_model", "")).strip()
          if parent_model:
              parent_path = Path(parent_model)
              for candidate in [parent_path.parent.parent, parent_path.parent]:
                  if (candidate / "blobs").exists() or (candidate / "manifests").exists():
                      candidates.append(candidate)

          env_root = os.environ.get("OLLAMA_MODELS", "").strip()
          if env_root:
              candidates.append(Path(env_root))

          for raw in ["/usr/share/ollama/.ollama/models", str(Path.home() / ".ollama" / "models")]:
              candidates.append(Path(raw))

          active_root = None
          for candidate in candidates:
              if candidate.exists() and ((candidate / "blobs").exists() or (candidate / "manifests").exists()):
                  active_root = candidate.resolve()
                  break

          if active_root is None:
              raise SystemExit("Unable to determine active Ollama model root.")

          Path("active_models_root.txt").write_text(active_root.as_posix(), encoding="utf-8")
          prepare_meta = {
              "schema_version": "1",
              "stage": "prepare",
              "model_name": os.environ["TARGET_MODEL_NAME"],
              "source_mode": "gguf-import",
              "gguf_url": r"${{ inputs.gguf_url }}",
              "gguf_manifest_url": r"${{ inputs.gguf_manifest_url }}",
              "quantization_manifest_url": r"${{ inputs.quantization_manifest_url }}",
              "quantization_origin": "turboquant",
              "turboquant_required": True,
              "prepared_artifact_name": r"${{ inputs.prepared_artifact_name }}",
              "chunk_size_bytes": int(r"${{ inputs.chunk_size_bytes }}"),
              "runner_os": os.environ.get("RUNNER_OS", ""),
              "github_run_id": r"${{ github.run_id }}",
              "github_repository": r"${{ github.repository }}",
              "active_models_root": active_root.as_posix(),
          }
          Path("prepare_metadata.json").write_text(
              json.dumps(prepare_meta, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          '@ | python -
          $activeRoot = Get-Content -LiteralPath "active_models_root.txt" -Raw
          "ACTIVE_OLLAMA_MODELS=$($activeRoot.Trim())" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Active Ollama models root: $($activeRoot.Trim())"

      - name: Stage chunked Ollama cache
        shell: pwsh
        run: |
          python scripts/package_ollama_models.py stage `
            --source "${env:ACTIVE_OLLAMA_MODELS}" `
            --output "${env:OLLAMA_STAGING_ROOT}" `
            --chunk-size "${{ inputs.chunk_size_bytes }}"

      - name: Add metadata files to stage
        shell: pwsh
        run: |
          Copy-Item "prepare_metadata.json" "${env:OLLAMA_STAGING_ROOT}\prepare_metadata.json" -Force
          Copy-Item "gguf-import\quantization_manifest.json" "${env:OLLAMA_STAGING_ROOT}\quantization_manifest.json" -Force
          if (Test-Path "gguf-import\gguf_download_manifest.json") {
            Copy-Item "gguf-import\gguf_download_manifest.json" "${env:OLLAMA_STAGING_ROOT}\gguf_download_manifest.json" -Force
          }
          Copy-Item "gguf-import\fetch_result.json" "${env:OLLAMA_STAGING_ROOT}\fetch_result.json" -Force
          Copy-Item "ollama_show.txt" "${env:OLLAMA_STAGING_ROOT}\ollama_show.txt" -Force
          Copy-Item "ollama_show.json" "${env:OLLAMA_STAGING_ROOT}\ollama_show.json" -Force
          ollama list | Out-File -FilePath "${env:OLLAMA_STAGING_ROOT}\ollama_models_list.txt" -Encoding utf8

      - name: Upload prepared LLM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.prepared_artifact_name }}
          path: ollama_artifact_stage/
          retention-days: ${{ fromJSON(inputs.retention_days) }}
          compression-level: 0
