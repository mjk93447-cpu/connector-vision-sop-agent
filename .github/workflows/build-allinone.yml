name: Build All-in-One Package (App Only, No LLM Model)

# 통팩 빌드 - EXE + Ollama + YOLO + config + launchers
#
# phi4-mini 모델 블롭은 포함하지 않습니다.
# 기존 portable-part2-phi4-mini 아티팩트의 블롭 파일을
# ollama_models/ 폴더에 복사하면 즉시 실행 가능합니다.
#
# phi4-mini 재사용 빌드: run #23139568715
#   https://github.com/mjk93447-cpu/connector-vision-sop-agent/actions/runs/23139568715
#
# 배포 절차 (INSTALL_GUIDE.txt 참고):
#   1. 이 아티팩트 압축 해제
#   2. Part2(portable-part2-phi4-mini) 압축 해제 후 blobs/ manifests/ 를
#      connector_agent\ollama_models\ 에 복사
#   3. start_agent.bat 더블클릭

on:
  workflow_dispatch:

jobs:
  build-allinone:
    name: All-in-One Package (EXE + Ollama, no LLM blobs)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare YOLO26x model
        shell: cmd
        run: |
          if not exist assets\models\yolo26x.pt (
            echo [INFO] yolo26x.pt not found - using yolo26n.pt as placeholder
            copy assets\models\yolo26n.pt assets\models\yolo26x.pt
          ) else (
            echo [INFO] yolo26x.pt found
          )
          for %%F in (assets\models\yolo26x.pt) do echo [INFO] yolo26x.pt size: %%~zF bytes

      - name: Verify YOLO loads
        shell: cmd
        run: |
          python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('YOLO OK  classes='+str(len(m.names)))"

      - name: Run unit tests (sanity check)
        run: |
          python -m pip install pytest pytest-cov
          python -m pytest tests/unit/ -q --tb=short --no-header

      - name: Build EXE with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist_build --clean

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist_build\connector_vision_agent.exe")) {
            throw "EXE not found after build"
          }
          $mb = [math]::Round((Get-Item "dist_build\connector_vision_agent.exe").Length / 1MB, 1)
          Write-Host "EXE OK: $mb MB"

      - name: Download Ollama Windows binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          if (-not (Test-Path "ollama_bin\ollama.exe")) { throw "ollama.exe not found" }
          $mb = [math]::Round((Get-Item "ollama_bin\ollama.exe").Length / 1MB, 1)
          Write-Host "ollama.exe OK: $mb MB"

      - name: Assemble all-in-one package
        shell: pwsh
        run: |
          $pkg = "connector_agent"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\ollama_models" -Force | Out-Null

          # Core executables
          Copy-Item "dist_build\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe"
          Copy-Item "ollama_bin\ollama.exe"                 "$pkg\ollama.exe"

          # Config: enable LLM with Ollama + phi4-mini
          $cfg = Get-Content assets\config.json -Raw | ConvertFrom-Json
          $cfg.llm.enabled    = $true
          $cfg.llm.backend    = "ollama"
          $cfg.llm.model_path = "phi4-mini-reasoning"
          $cfg.llm.http_url   = "http://127.0.0.1:11434/v1/chat/completions"
          $cfg | ConvertTo-Json -Depth 10 |
            Set-Content "$pkg\assets\config.json" -Encoding UTF8

          # sop_steps + YOLO model + launchers + docs
          Copy-Item "assets\sop_steps.json"              "$pkg\assets\sop_steps.json"
          Copy-Item "assets\models\yolo26x.pt"           "$pkg\assets\models\yolo26x.pt"
          Copy-Item "assets\launchers\start_agent.bat"   "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat"   "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"

          foreach ($f in @("README.md", "TEST_REPORT.md")) {
            if (Test-Path $f) { Copy-Item $f "$pkg\$f" }
          }

          "Extract portable-part2-phi4-mini blobs here. See INSTALL_GUIDE.txt." |
            Set-Content "$pkg\ollama_models\PLACE_PART2_HERE.txt" -Encoding UTF8

          # Manifest
          Write-Host ""
          Write-Host "=== connector_agent/ package manifest ==="
          Get-ChildItem $pkg -Recurse |
            Where-Object { -not $_.PSIsContainer } |
            Select-Object @{N="File";E={$_.FullName.Replace((Resolve-Path $pkg).Path+"\","")}},
                          @{N="MB";E={[math]::Round($_.Length/1MB,2)}} |
            Format-Table -AutoSize

      - name: Upload all-in-one artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-v3-allinone
          path: connector_agent/
          retention-days: 90
