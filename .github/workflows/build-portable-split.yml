name: Build Portable Offline Bundle (Split)
# 보안 PC 배포용 오프라인 포터블 번들 분할 빌드
#
# 모델: phi4-mini-reasoning (Microsoft / 미국, 비중국 ✅)
#   - 3.8B 파라미터, ~2.5GB (Q4)
#   - 영어 추론 특화: MATH-500 90.4, GPQA 49.0 — 3.8B 최강 벤치마크
#   - SOP 로그 분석 / 구조적 추론 / config patch 제안에 최적
#   - 라인 PC 영어 전용 환경에 적합
#   - 참고: https://ollama.com/library/phi4-mini-reasoning
#
# 결과물 (2개의 artifact):
#   - portable-part1-app-exe-ollama     (~500MB)  EXE + Ollama 바이너리 + 스크립트
#   - portable-part2-llm-phi4-mini-rsn  (~2.5GB)  LLM 모델 블롭
#
# 보안 PC 조립:
#   scripts/merge_portable_parts.ps1 실행 → connector_agent\start_agent.bat

on:
  workflow_dispatch:
    inputs:
      ollama_model:
        description: "Ollama model tag to bundle"
        required: false
        default: "phi4-mini-reasoning"
      artifact_label:
        description: "Part 2 artifact suffix label"
        required: false
        default: "phi4-mini-rsn"

jobs:
  # ──────────────────────────────────────────────────────────
  # Part 1: EXE + Ollama Windows 바이너리 + 런처 스크립트
  #   예상 artifact 크기: ~500MB
  # ──────────────────────────────────────────────────────────
  part1-app:
    name: "Part 1 — EXE + Ollama binary + scripts (~500MB)"
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CPU torch wheels)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare YOLO model placeholder (yolo26x.pt)
        shell: cmd
        run: |
          if not exist assets\models\yolo26x.pt (
            echo yolo26x.pt not found - using yolo26n.pt as CI placeholder
            copy assets\models\yolo26n.pt assets\models\yolo26x.pt
          ) else (
            echo yolo26x.pt found
          )

      - name: Build EXE with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist --clean

      - name: Verify EXE
        shell: cmd
        run: |
          if exist dist\connector_vision_agent.exe (
            for %%F in (dist\connector_vision_agent.exe) do echo EXE OK: %%~zF bytes
          ) else (
            echo EXE build FAILED && exit /b 1
          )

      - name: Download Ollama Windows binary
        shell: pwsh
        run: |
          Write-Host "Downloading latest Ollama for Windows..."
          Invoke-WebRequest `
            -Uri "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip" `
            -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          $sz = [math]::Round((Get-Item "ollama_bin\ollama.exe").Length/1MB,1)
          Write-Host "ollama.exe ready: $sz MB"

      - name: Create portable config.json
        shell: pwsh
        run: |
          $model = "${{ github.event.inputs.ollama_model }}"
          if (-not $model) { $model = "phi4-mini-reasoning" }
          $config = [ordered]@{
            version       = "2.0.0"
            password      = "1111"
            pin_count_min = $null
            vision        = [ordered]@{
              model_path           = "assets/models/yolo26x.pt"
              confidence_threshold = 0.6
            }
            llm = [ordered]@{
              enabled          = $true
              backend          = "ollama"
              model_path       = $model
              http_url         = "http://127.0.0.1:11434/v1/chat/completions"
              ctx_size         = 8192
              gpu_layers       = 0
              max_input_tokens  = 6144
              max_output_tokens = 1024
            }
          }
          $config | ConvertTo-Json -Depth 5 | Set-Content dist\config.portable.json -Encoding UTF8
          Write-Host "Portable config: model=$model"

      - name: Assemble Part 1 package
        shell: pwsh
        run: |
          $model = "${{ github.event.inputs.ollama_model }}"
          if (-not $model) { $model = "phi4-mini-reasoning" }

          New-Item -ItemType Directory -Force -Path dist\part1 | Out-Null

          Copy-Item dist\connector_vision_agent.exe dist\part1\
          Copy-Item ollama_bin\* dist\part1\ -Recurse -Force
          Copy-Item dist\config.portable.json dist\part1\config.json
          @("README.md","TEST_REPORT.md","ROADMAP.md") | ForEach-Object {
            if (Test-Path $_) { Copy-Item $_ dist\part1\ }
          }
          # Placeholder dir for Part 2 model blobs
          New-Item -ItemType Directory -Force -Path dist\part1\ollama_models | Out-Null

          # ── start_agent.bat ──
          Set-Content dist\part1\start_agent.bat -Encoding UTF8 -Value @"
          @echo off
          chcp 65001 >nul
          title Connector Vision SOP Agent (Offline)
          set OLLAMA_MODELS=%~dp0ollama_models
          set OLLAMA_HOST=127.0.0.1:11434

          echo =================================================
          echo  Connector Vision SOP Agent v2.0.0  [Offline]
          echo  LLM : $model
          echo  Vendor: Microsoft (US) - Non-Chinese
          echo =================================================
          echo.
          echo [1/3] Starting Ollama server...
          start /B "%~dp0ollama.exe" serve
          timeout /t 15 /nobreak >nul
          echo [2/3] Verifying LLM model...
          "%~dp0ollama.exe" list
          echo [3/3] Launching SOP Agent...
          "%~dp0connector_vision_agent.exe"
          pause
          "@

          # ── stop_ollama.bat ──
          Set-Content dist\part1\stop_ollama.bat -Encoding UTF8 -Value @"
          @echo off
          echo Stopping Ollama...
          taskkill /IM ollama.exe /F >nul 2>&1
          echo Done.
          pause
          "@

          # ── MERGE_GUIDE.txt ──
          Set-Content dist\part1\MERGE_GUIDE.txt -Encoding UTF8 -Value @"
          =====================================================
           Connector Vision SOP Agent - Portable Bundle Guide
          =====================================================

          DOWNLOADS REQUIRED (GitHub Actions Artifacts):
            1. portable-part1-app-exe-ollama.zip       ~500MB
            2. portable-part2-llm-phi4-mini-rsn.zip    ~2.5GB

          METHOD A - Automatic (PowerShell):
            1. Copy scripts/merge_portable_parts.ps1 next to the two zips
            2. Run in PowerShell:
               .\merge_portable_parts.ps1
            3. Double-click connector_agent\start_agent.bat

          METHOD B - Manual:
            1. Create folder: C:\tools\connector_agent\
            2. Extract portable-part1-app-exe-ollama.zip → C:\tools\connector_agent\
            3. Extract portable-part2-llm-phi4-mini-rsn.zip
               → copy blobs\ and manifests\ into C:\tools\connector_agent\ollama_models\

          FINAL STRUCTURE:
            connector_agent\
            ├── connector_vision_agent.exe
            ├── ollama.exe
            ├── config.json
            ├── start_agent.bat        <- run this
            ├── stop_ollama.bat
            └── ollama_models\
                ├── blobs\             <- from Part 2
                └── manifests\        <- from Part 2

          LLM MODEL INFO:
            Model : $model
            Vendor: Microsoft Corporation (USA)
            Size  : ~2.5GB (Q4 quantized)
            Mode  : Fully offline, no internet required
          =====================================================
          "@

          Write-Host "=== Part 1 package contents ==="
          Get-ChildItem dist\part1 |
            Format-Table Name, @{N='Size';E={if($_.PSIsContainer){'[dir]'}else{"$([math]::Round($_.Length/1MB,1)) MB"}}}

      - name: Upload Part 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-part1-app-exe-ollama
          path: dist/part1/
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Part 2: LLM 모델 블롭 (phi4-mini-reasoning, ~2.5GB)
  #   Python/torch 설치 불필요 → 빠른 실행
  #   예상 소요 시간: 모델 pull 10분 + artifact 업로드 5분
  # ──────────────────────────────────────────────────────────
  part2-model:
    name: "Part 2 — LLM model blobs (phi4-mini-reasoning, ~2.5GB)"
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Download Ollama Windows binary
        shell: pwsh
        run: |
          Write-Host "Downloading Ollama for Windows..."
          Invoke-WebRequest `
            -Uri "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip" `
            -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force

      - name: Check disk space
        shell: pwsh
        run: |
          $free = [math]::Round((Get-PSDrive C).Free/1GB, 2)
          Write-Host "Free disk: $free GB (need ~6 GB for 2.5GB model + artifact)"
          if ($free -lt 6) { Write-Error "Insufficient disk space"; exit 1 }

      - name: Start Ollama and pull model
        shell: pwsh
        env:
          OLLAMA_MODELS: ${{ github.workspace }}\ollama_models
          OLLAMA_HOST: "127.0.0.1:11434"
        run: |
          $model = "${{ github.event.inputs.ollama_model }}"
          if (-not $model) { $model = "phi4-mini-reasoning" }

          New-Item -ItemType Directory -Force -Path "$env:OLLAMA_MODELS" | Out-Null
          Write-Host "OLLAMA_MODELS = $env:OLLAMA_MODELS"
          Write-Host "Pulling model: $model"

          # Start Ollama server background
          Start-Process -FilePath "ollama_bin\ollama.exe" `
            -ArgumentList "serve" -NoNewWindow
          Write-Host "Waiting 15s for Ollama to initialise..."
          Start-Sleep -Seconds 15

          # Pull model
          Write-Host "Pulling $model (~2.5GB)..."
          & ollama_bin\ollama.exe pull $model
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Model pull failed (exit $LASTEXITCODE)"; exit 1
          }
          Write-Host "Pull complete."
          & ollama_bin\ollama.exe list

      - name: Report model blob sizes
        shell: pwsh
        run: |
          Write-Host "=== Model blobs ==="
          Get-ChildItem ollama_models -Recurse -File |
            Select-Object Name,
              @{N='MB';E={[math]::Round($_.Length/1MB,1)}} |
            Format-Table
          $gb = (Get-ChildItem ollama_models -Recurse -File |
            Measure-Object Length -Sum).Sum/1GB
          Write-Host ("Total: {0:F2} GB" -f $gb)

      - name: Upload Part 2 artifact (model blobs)
        uses: actions/upload-artifact@v4
        with:
          name: portable-part2-llm-${{ github.event.inputs.artifact_label || 'phi4-mini-rsn' }}
          path: ollama_models/
          retention-days: 30
