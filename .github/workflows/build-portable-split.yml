name: Build Portable Offline Bundle (Split)

# Offline portable bundle for secure PC deployment
# Model: phi4-mini-reasoning (Microsoft / USA) - non-Chinese model
#
# Produces 2 artifacts:
#   portable-part1-app        ~400 MB   EXE + Ollama binary + launchers
#   portable-part2-phi4-mini  ~2.5 GB   LLM model blobs
#
# See assets/launchers/MERGE_GUIDE.txt for assembly instructions.

on:
  workflow_dispatch:

jobs:

  part1-app:
    name: Part 1 - EXE plus Ollama binary
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare YOLO26x placeholder
        shell: cmd
        run: |
          if not exist assets\models\yolo26x.pt (
            echo CI placeholder: copying yolo26n.pt as yolo26x.pt
            copy assets\models\yolo26n.pt assets\models\yolo26x.pt
          )

      - name: Build EXE with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist_build --clean

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist_build\connector_vision_agent.exe")) {
            throw "EXE not found after build"
          }
          $mb = [math]::Round((Get-Item "dist_build\connector_vision_agent.exe").Length / 1MB, 1)
          Write-Host "EXE OK: $mb MB"

      - name: Download Ollama Windows binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          if (-not (Test-Path "ollama_bin\ollama.exe")) { throw "ollama.exe not found" }
          $mb = [math]::Round((Get-Item "ollama_bin\ollama.exe").Length / 1MB, 1)
          Write-Host "ollama.exe OK: $mb MB"

      - name: Assemble package directory
        shell: pwsh
        run: |
          $pkg = "pkg_part1"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null

          Copy-Item "dist_build\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe"
          Copy-Item "ollama_bin\ollama.exe" "$pkg\ollama.exe"

          New-Item -ItemType Directory -Path "$pkg\assets" -Force | Out-Null
          $cfg = Get-Content assets\config.json -Raw | ConvertFrom-Json
          $cfg.llm.enabled    = $true
          $cfg.llm.backend    = "ollama"
          $cfg.llm.model_path = "phi4-mini-reasoning"
          $cfg.llm.http_url   = "http://127.0.0.1:11434/v1/chat/completions"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "$pkg\assets\config.json" -Encoding UTF8

          Copy-Item "assets\launchers\start_agent.bat" "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat" "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"

          foreach ($f in @("README.md", "TEST_REPORT.md")) {
            if (Test-Path $f) { Copy-Item $f "$pkg\$f" }
          }

          New-Item -ItemType Directory -Path "$pkg\ollama_models" -Force | Out-Null
          "Extract portable-part2-phi4-mini.zip contents here (ollama_models folder)" |
            Set-Content "$pkg\ollama_models\PLACE_PART2_HERE.txt" -Encoding UTF8

          Write-Host "=== Package contents ==="
          Get-ChildItem $pkg -Recurse | Select-Object FullName | Format-Table -AutoSize

      - name: Upload Part 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-part1-app
          path: pkg_part1/
          retention-days: 90

  part2-model:
    name: Part 2 - phi4-mini-reasoning model blobs
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check disk space
        shell: pwsh
        run: |
          $free = [math]::Round((Get-PSDrive C).Free / 1GB, 2)
          Write-Host "Free disk: $free GB"
          if ($free -lt 6) { throw "Insufficient disk space (need 6 GB)" }

      - name: Download Ollama Windows binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          Write-Host "Ollama binary ready"

      - name: Configure model storage path
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:GITHUB_WORKSPACE "ollama_models"
          New-Item -ItemType Directory -Path $modelDir -Force | Out-Null
          "OLLAMA_MODELS=$modelDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "OLLAMA_MODELS=$modelDir"

      - name: Start Ollama server
        shell: pwsh
        run: |
          $env:OLLAMA_HOST = "127.0.0.1:11434"
          Start-Process "ollama_bin\ollama.exe" -ArgumentList "serve" -WindowStyle Hidden
          Write-Host "Waiting 20s for Ollama..."
          Start-Sleep -Seconds 20
          Write-Host "Ollama ready"

      - name: Pull phi4-mini-reasoning model
        shell: pwsh
        run: |
          $env:OLLAMA_HOST = "127.0.0.1:11434"
          Write-Host "Pulling phi4-mini-reasoning (Microsoft, ~2.5 GB)..."
          & ollama_bin\ollama.exe pull phi4-mini-reasoning
          if ($LASTEXITCODE -ne 0) { throw "Model pull failed with exit $LASTEXITCODE" }
          Write-Host "Pull complete"
          & ollama_bin\ollama.exe list

      - name: Verify model blobs
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:GITHUB_WORKSPACE "ollama_models"
          $files = Get-ChildItem $modelDir -Recurse -File
          $files | Select-Object Name, @{N="MB";E={[math]::Round($_.Length/1MB,1)}} | Format-Table
          $gb = ($files | Measure-Object Length -Sum).Sum / 1GB
          Write-Host ("Total model size: {0:F2} GB" -f $gb)
          if ($gb -lt 1.0) { throw "Model blobs too small - pull may have failed" }

      - name: Upload Part 2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-part2-phi4-mini
          path: ollama_models/
          retention-days: 90
