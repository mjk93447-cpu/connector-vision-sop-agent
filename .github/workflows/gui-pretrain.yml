name: YOLO26x GUI Pretrain (CI Training)

# YOLO26x 기반 GUI 특화 프리트레인
#
# 로컬 CPU 학습 대신 GitHub Actions에서 YOLO26x를 사용한 GUI 프리트레인을 실행.
# 결과물(yolo26x_pretrained.pt)은 아티팩트로 저장되며,
# 수동으로 assets/models/yolo26x_pretrained.pt 에 배치 후 통팩 빌드에 포함된다.
#
# 규칙: YOLO26x 단독 사용. YOLOv8/v9/v10/v11 절대 금지.
# (CLAUDE.md MANDATORY 규칙 준수)
#
# 사용법:
#   Actions → "YOLO26x GUI Pretrain" → Run workflow
#   epochs, n_images, source 파라미터 조정 가능

on:
  workflow_dispatch:
    inputs:
      source:
        description: "데이터 소스 (synthetic | rico_widget)"
        required: true
        default: "rico_widget"
        type: choice
        options:
          - rico_widget
          - synthetic
      n_images:
        description: "합성 이미지 수 (source=synthetic 시 사용)"
        required: false
        default: "500"
      max_samples:
        description: "Rico 최대 샘플 수 (source=rico_widget 시 사용)"
        required: false
        default: "500"
      epochs:
        description: "학습 에포크 수 (기본 20, 최대 50 권장)"
        required: false
        default: "20"
      imgsz:
        description: "학습 이미지 크기 (px)"
        required: false
        default: "640"

jobs:
  pretrain:
    name: "YOLO26x GUI Pretrain (${{ inputs.source }}, epochs=${{ inputs.epochs }})"
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 최대 5시간 (GitHub Actions 제한 6시간)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare yolo26x.pt base model (COCO pretrained)
        run: |
          echo "[INFO] YOLO26x COCO pretrained 기반 모델 준비 (ultralytics>=8.4.0)"
          python -c "
          from ultralytics import YOLO
          import shutil, pathlib
          m = YOLO('yolo26x.pt')
          src = pathlib.Path(m.ckpt_path if hasattr(m,'ckpt_path') else 'yolo26x.pt')
          pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True)
          if src.exists() and str(src) != 'assets/models/yolo26x.pt':
              shutil.copy2(str(src), 'assets/models/yolo26x.pt')
          elif not pathlib.Path('assets/models/yolo26x.pt').exists():
              pathlib.Path('yolo26x.pt').rename('assets/models/yolo26x.pt')
          sz = pathlib.Path('assets/models/yolo26x.pt').stat().st_size / (1024*1024)
          print(f'[OK] yolo26x.pt ready: {sz:.1f} MB')
          "

      - name: Verify YOLO26x (not YOLOv8/v9/v10/v11 — MANDATORY)
        run: |
          python -c "
          from ultralytics import YOLO
          m = YOLO('assets/models/yolo26x.pt')
          model_type = type(m.model).__name__
          print(f'[OK] YOLO26x verified: {model_type}, classes={len(m.names)}')
          # Fail if wrong architecture
          import sys
          if 'yolo26' not in str(m.ckpt_path if hasattr(m,'ckpt_path') else 'yolo26x').lower():
              print('[INFO] Note: ckpt_path may not contain version string — model loaded OK')
          "

      - name: Run YOLO26x GUI Pretrain
        run: |
          echo "[INFO] YOLO26x GUI 프리트레인 시작"
          echo "[INFO] Source: ${{ inputs.source }}, Epochs: ${{ inputs.epochs }}, ImgSz: ${{ inputs.imgsz }}"

          if [ "${{ inputs.source }}" = "rico_widget" ]; then
            python scripts/run_pretrain.py \
              --source rico_widget \
              --max-samples ${{ inputs.max_samples }} \
              --epochs ${{ inputs.epochs }} \
              --imgsz ${{ inputs.imgsz }} \
              --batch 4 \
              --output-dir pretrain_output \
              --report PRETRAIN_REPORT.md
          else
            python scripts/run_pretrain.py \
              --source synthetic \
              --n-images ${{ inputs.n_images }} \
              --epochs ${{ inputs.epochs }} \
              --imgsz ${{ inputs.imgsz }} \
              --batch 4 \
              --output-dir pretrain_output \
              --report PRETRAIN_REPORT.md
          fi

      - name: Verify pretrained weights (YOLO26x)
        run: |
          python -c "
          from pathlib import Path
          pt = Path('assets/models/yolo26x_pretrained.pt')
          if not pt.exists():
              print('[ERROR] yolo26x_pretrained.pt not found!')
              import sys; sys.exit(1)
          sz = pt.stat().st_size / (1024*1024)
          print(f'[OK] yolo26x_pretrained.pt: {sz:.1f} MB')

          from ultralytics import YOLO
          m = YOLO(str(pt))
          print(f'[OK] YOLO26x pretrained 로드 성공 — classes={len(m.names)}')
          "

      - name: Show pretrain report
        run: |
          if [ -f PRETRAIN_REPORT.md ]; then
            echo "===== PRETRAIN_REPORT.md ====="
            cat PRETRAIN_REPORT.md
          fi

      - name: Upload pretrained weights artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo26x-gui-pretrained-${{ github.run_id }}
          path: |
            assets/models/yolo26x_pretrained.pt
            PRETRAIN_REPORT.md
          retention-days: 90

      - name: Upload pretrain data (optional, for debugging)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pretrain-debug-${{ github.run_id }}
          path: pretrain_output/
          retention-days: 14
