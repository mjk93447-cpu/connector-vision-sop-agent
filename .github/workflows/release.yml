name: Build & Release Connector Vision EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Torch CPU wheels
        run: |
          python -m pip install torch==2.4.0+cpu torchvision==0.19.0+cpu ^
            -f https://download.pytorch.org/whl/torch_stable.html

      - name: Install project requirements
        run: python -m pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: .\build.bat

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector_vision_agent-exe
          path: dist/connector_vision_agent.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/connector_vision_agent.exe
            assets/config.json
            README.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

