name: Build & Release Connector Vision EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (CPU wheels)
        run: |
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Verify YOLO26n loads (80 classes)
        run: |
          python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26n.pt'); print('✅ YOLO26n:', len(m.names), 'classes')"

      - name: Build EXE with PyInstaller (spec)
        shell: cmd
        run: |
          pyinstaller build_exe.spec --distpath dist --clean

      - name: Verify EXE built
        shell: cmd
        run: |
          dir dist
          if exist dist\connector_vision_agent.exe (
            for %%F in (dist\connector_vision_agent.exe) do echo EXE OK: %%~zF bytes
          ) else (
            echo ❌ EXE build FAILED
            exit /b 1
          )

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector_vision_agent-exe
          path: |
            dist/connector_vision_agent.exe
            assets/config.json
            README.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/connector_vision_agent.exe
            assets/config.json
            README.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
