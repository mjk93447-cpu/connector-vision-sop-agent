name: Build & Release Connector Vision EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (CPU wheels + PyQt6)
        run: |
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare yolo26x.pt (download yolo26x.pt base if not present)
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            Write-Host "[INFO] yolo26x.pt not found - downloading yolo26x.pt base model"
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt'); print('Copied', src)"
          } else {
            Write-Host "[INFO] yolo26x.pt found"
          }
          $sz = [math]::Round((Get-Item "assets\models\yolo26x.pt").Length/1MB,1)
          Write-Host "[INFO] yolo26x.pt size: $sz MB"

      - name: Verify YOLO26x loads
        run: |
          python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('YOLO26x OK, classes:', len(m.names))"

      - name: Build EXE with PyInstaller (spec)
        shell: cmd
        run: |
          pyinstaller build_exe.spec --distpath dist --clean

      - name: Verify EXE built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\connector_vision_agent.exe")) {
            throw "EXE build FAILED - file not found"
          }
          $mb = [math]::Round((Get-Item "dist\connector_vision_agent.exe").Length / 1MB, 1)
          Write-Host "EXE OK: $mb MB"

      - name: Assemble release package
        shell: pwsh
        run: |
          $pkg = "release_pkg"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null

          Copy-Item "dist\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe"
          Copy-Item "assets\config.json"    "$pkg\assets\config.json"
          Copy-Item "assets\sop_steps.json" "$pkg\assets\sop_steps.json"
          Copy-Item "assets\launchers\start_agent.bat"  "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat"  "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt"  "$pkg\MERGE_GUIDE.txt"

          # MANDATORY: YOLO26x 전용 (YOLOv8/v9/v10/v11 사용 금지)
          if (Test-Path "assets\models\yolo26x.pt") {
            Copy-Item "assets\models\yolo26x.pt" "$pkg\assets\models\yolo26x.pt"
            $mb = [math]::Round((Get-Item "assets\models\yolo26x.pt").Length / 1MB, 1)
            Write-Host "yolo26x.pt bundled: $mb MB"
          }

          # YOLO26x GUI 프리트레인 가중치 (있으면 번들링)
          if (Test-Path "assets\models\yolo26x_pretrained.pt") {
            Copy-Item "assets\models\yolo26x_pretrained.pt" "$pkg\assets\models\yolo26x_pretrained.pt"
            $mb = [math]::Round((Get-Item "assets\models\yolo26x_pretrained.pt").Length/1MB,1)
            Write-Host "yolo26x_pretrained.pt (YOLO26x GUI 특화) bundled: $mb MB"
          }

          foreach ($f in @("README.md", "TEST_REPORT.md", "ROADMAP.md")) {
            if (Test-Path $f) { Copy-Item $f "$pkg\$f" }
          }

          New-Item -ItemType Directory -Path "$pkg\ollama_models" -Force | Out-Null
          "Place phi4-mini model blobs here (see MERGE_GUIDE.txt)" |
            Set-Content "$pkg\ollama_models\PLACE_PART2_HERE.txt" -Encoding UTF8

          Write-Host "=== Release package contents ==="
          Get-ChildItem $pkg -Recurse | Select-Object FullName | Format-Table -AutoSize

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector_vision_agent-v3
          path: release_pkg/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/connector_vision_agent.exe
            assets/config.json
            assets/sop_steps.json
            TEST_REPORT.md
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
