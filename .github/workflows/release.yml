name: Build & Release Connector Vision EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (CPU wheels)
        run: |
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare CI placeholder model (yolo26x.pt)
        shell: cmd
        run: |
          if not exist assets\models\yolo26x.pt (
            echo yolo26x.pt not found — using yolo26n.pt as CI placeholder
            copy assets\models\yolo26n.pt assets\models\yolo26x.pt
          ) else (
            echo yolo26x.pt found
          )

      - name: Verify YOLO26x loads
        run: |
          python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('YOLO26x OK, classes:', len(m.names))"

      - name: Build EXE with PyInstaller (spec)
        shell: cmd
        run: |
          pyinstaller build_exe.spec --distpath dist --clean

      - name: Verify EXE built
        shell: cmd
        run: |
          dir dist
          if exist dist\connector_vision_agent.exe (
            for %%F in (dist\connector_vision_agent.exe) do echo EXE OK: %%~zF bytes
          ) else (
            echo EXE build FAILED
            exit /b 1
          )

      - name: Upload offline EXE bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector_vision_agent-exe
          path: |
            dist/connector_vision_agent.exe
            assets/config.json
            tools/dummy_ollama_server.py
            TEST_REPORT.md
            README.md
            ROADMAP.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/connector_vision_agent.exe
            assets/config.json
            tools/dummy_ollama_server.py
            TEST_REPORT.md
            README.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
