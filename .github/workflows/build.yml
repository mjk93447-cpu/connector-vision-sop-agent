name: Build Connector Vision App + CUDA Overlay

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "tests/**"
      - "assets/config.json"
      - "assets/sop_steps.json"
      - "assets/launchers/**"
      - "assets/models/*.pt"
      - "build_exe.spec"
      - "scripts/pyinstaller_support.py"
      - "scripts/split_cuda_runtime.py"
      - "scripts/preflight_cuda_app.py"
      - "scripts/preflight_gui_runtime.py"
      - "scripts/pipeline_quality_gate.ps1"
      - "scripts/assemble_release_pack.ps1"
      - "src/model_artifacts.py"
      - "requirements-common.txt"
      - "requirements-dev.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-app:
    name: App pack
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-common.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-common.txt
          python -m pip install --force-reinstall --index-url https://download.pytorch.org/whl/cu121 torch==2.3.1 torchvision==0.18.1
          python -m pip install -r requirements-dev.txt
          python -m pip install --force-reinstall --no-cache-dir numpy==1.26.4

      - name: Materialize runtime YOLO checkpoint
        shell: pwsh
        run: |
          python -c "from pathlib import Path; import shutil; from src.model_artifacts import resolve_local_pretrained_model, resolve_runtime_model; runtime=resolve_runtime_model('assets/models/yolo26x_local_pretrained.pt'); target=resolve_local_pretrained_model(); target.parent.mkdir(parents=True, exist_ok=True); shutil.copy2(str(runtime), str(target)) if Path(runtime) != target else None; print(f'Runtime model: {runtime}'); print(f'Local slot: {target}')"

      - name: Pipeline quality gate (app, smart)
        shell: pwsh
        run: scripts\pipeline_quality_gate.ps1 -Stage ci-smart -Target app

      - name: Preflight CUDA app runtime
        shell: cmd
        run: python scripts/preflight_cuda_app.py --model assets/models/yolo26x_local_pretrained.pt --require-cuda-wheel

      - name: Verify runtime YOLO loads
        shell: cmd
        run: python -c "from src.model_artifacts import resolve_runtime_model; from ultralytics import YOLO; p=resolve_runtime_model('assets/models/yolo26x_local_pretrained.pt'); m=YOLO(str(p)); print('Runtime model:', p); print('YOLO classes:', len(m.names))"

      - name: Build app directory with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist --workpath build-app --clean

      - name: Verify app directory built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\connector_vision_agent\connector_vision_agent.exe")) {
            throw "App build failed - EXE not found inside dist\\connector_vision_agent"
          }

      - name: Assemble full app folder
        shell: pwsh
        run: |
          $pkg = "connector_agent_app_full"
          if (Test-Path $pkg) {
            Remove-Item -LiteralPath $pkg -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          Copy-Item "dist\connector_vision_agent\*" "$pkg\" -Recurse -Force
          Copy-Item "assets\launchers\start_agent.bat" "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat" "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "assets\launchers\PLACE_APP_HERE.txt" "$pkg\PLACE_APP_HERE.txt"
          if (Test-Path "README_INSTALL_EN.md") { Copy-Item "README_INSTALL_EN.md" "$pkg\README_INSTALL_EN.md" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$pkg\README.md" }

      - name: Split CUDA overlay artifact
        shell: cmd
        run: python scripts/split_cuda_runtime.py --source connector_agent_app_full --core-out connector_agent_app_core --cuda-out connector_agent_cuda_runtime --manifest connector_agent_cuda_runtime/cuda_runtime_manifest.json

      - name: Upload app core artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-app-core
          path: connector_agent_app_core/
          retention-days: 90

      - name: Upload CUDA runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-cuda-runtime
          path: connector_agent_cuda_runtime/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            connector_agent_app_core/INSTALL_GUIDE.txt
            connector_agent_app_core/MERGE_GUIDE.txt
            connector_agent_cuda_runtime/cuda_runtime_manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
