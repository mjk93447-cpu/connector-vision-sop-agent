name: Build Connector Vision App Packs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "tests/**"
      - "assets/config.json"
      - "assets/sop_steps.json"
      - "assets/launchers/**"
      - "assets/models/*.pt"
      - "build_exe.spec"
      - "scripts/pyinstaller_support.py"
      - "scripts/preflight_cuda_app.py"
      - "scripts/preflight_gui_runtime.py"
      - "scripts/pipeline_quality_gate.ps1"
      - "scripts/assemble_release_pack.ps1"
      - "scripts/build_release_artifacts.ps1"
      - "scripts/package_ollama_models.py"
      - "scripts/publish_release_bundle.py"
      - "src/model_artifacts.py"
      - "requirements-common.txt"
      - "requirements-dev.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-llm-models:
    name: Prepare Ollama models (qwen3:8b + gemma4:9b)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_MODELS: ${{ github.workspace }}/.ollama_runtime/models
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure Ollama runtime workspace exists
        shell: pwsh
        run: New-Item -ItemType Directory -Path $env:OLLAMA_MODELS -Force | Out-Null

      - name: Install Ollama when missing
        shell: pwsh
        run: |
          if (-not (Get-Command ollama -ErrorAction SilentlyContinue)) {
            winget install Ollama.Ollama --silent --accept-source-agreements --accept-package-agreements
          }
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          $ollamaExe = ""
          $cmd = Get-Command ollama -ErrorAction SilentlyContinue
          if ($cmd) { $ollamaExe = $cmd.Source }
          if (-not $ollamaExe) {
            $candidates = @(
              (Join-Path $env:LOCALAPPDATA "Programs\Ollama\ollama.exe"),
              (Join-Path $env:ProgramFiles "Ollama\ollama.exe")
            )
            if ($env:ProgramFiles -and (Test-Path "${env:ProgramFiles(x86)}")) {
              $candidates += (Join-Path ${env:ProgramFiles(x86)} "Ollama\ollama.exe")
            }
            foreach ($candidate in $candidates) {
              if ($candidate -and (Test-Path $candidate)) {
                $ollamaExe = $candidate
                break
              }
            }
          }
          if (-not $ollamaExe) {
            $whereResult = & where.exe ollama 2>$null | Select-Object -First 1
            if ($whereResult) { $ollamaExe = $whereResult.Trim() }
          }
          if (-not $ollamaExe) {
            throw "Unable to locate ollama.exe after installation."
          }
          $ollamaDir = Split-Path -Parent $ollamaExe
          if ($env:Path -notlike "*$ollamaDir*") {
            $env:Path = "$ollamaDir;$env:Path"
          }
          "OLLAMA_EXE=$ollamaExe" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Start Ollama server
        shell: pwsh
        run: |
          $serveExe = if ($env:OLLAMA_EXE) { $env:OLLAMA_EXE } else { "ollama" }
          Start-Process -FilePath $serveExe -ArgumentList "serve"
          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 2
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:11434/api/version" -UseBasicParsing -TimeoutSec 5 | Out-Null
              $ready = $true
              break
            } catch {
              Write-Host "Waiting for Ollama server..."
            }
          }
          if (-not $ready) { throw "Ollama server did not become ready." }

      - name: Pull v7 offline models
        shell: pwsh
        run: |
          $ollama = if ($env:OLLAMA_EXE) { $env:OLLAMA_EXE } else { "ollama" }
          & $ollama pull qwen3:8b
          & $ollama pull gemma4:9b
          & $ollama list | Out-File -FilePath "ollama_models_list.txt" -Encoding utf8
          & $ollama show qwen3:8b | Out-File -FilePath "ollama_show_qwen3_8b.txt" -Encoding utf8
          & $ollama show gemma4:9b | Out-File -FilePath "ollama_show_gemma4_9b.txt" -Encoding utf8

      - name: Stage chunked Ollama cache
        shell: pwsh
        run: |
          python scripts/package_ollama_models.py stage `
            --source "${env:OLLAMA_MODELS}" `
            --output "ollama_artifact_stage" `
            --chunk-size 2000000000
          Copy-Item "ollama_models_list.txt" "ollama_artifact_stage\ollama_models_list.txt" -Force
          Copy-Item "ollama_show_qwen3_8b.txt" "ollama_artifact_stage\ollama_show_qwen3_8b.txt" -Force
          Copy-Item "ollama_show_gemma4_9b.txt" "ollama_artifact_stage\ollama_show_gemma4_9b.txt" -Force
          Set-Content -LiteralPath "ollama_artifact_stage\prepare_metadata.json" -Value (@{
            schema_version = "1"
            bundle_type = "connector-agent-llm-v7-cache"
            models = @("qwen3:8b", "gemma4:9b")
            release_tag = "${{ github.ref_name }}"
          } | ConvertTo-Json -Depth 4) -Encoding UTF8

      - name: Upload LLM cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-llm-v7-cache
          path: ollama_artifact_stage/
          retention-days: 90
          compression-level: 0

  build-app:
    name: App pack (${{ matrix.runtime_flavor }})
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime_flavor: cpu
            torch_index_url: https://download.pytorch.org/whl/cpu
            require_cuda_wheel: "0"
            artifact_name: connector-agent-app-cpu
            package_root: connector_agent_app_cpu
          - runtime_flavor: gpu
            torch_index_url: https://download.pytorch.org/whl/cu121
            require_cuda_wheel: "1"
            artifact_name: connector-agent-app-gpu
            package_root: connector_agent_app_gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-common.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-common.txt
          python -m pip install --force-reinstall --index-url ${{ matrix.torch_index_url }} torch==2.3.1 torchvision==0.18.1
          python -m pip install -r requirements-dev.txt
          python -m pip install --force-reinstall --no-cache-dir numpy==1.26.4

      - name: Install Ollama runtime
        shell: pwsh
        run: |
          $ollamaExe = ""
          if (-not (Get-Command ollama -ErrorAction SilentlyContinue)) {
            winget install Ollama.Ollama --silent --accept-source-agreements --accept-package-agreements
          }
          $cmd = Get-Command ollama -ErrorAction SilentlyContinue
          if ($cmd) {
            $ollamaExe = $cmd.Source
          }
          if (-not $ollamaExe) {
            $candidates = @(
              (Join-Path $env:LOCALAPPDATA "Programs\Ollama\ollama.exe"),
              (Join-Path $env:ProgramFiles "Ollama\ollama.exe")
            )
            if ($env:ProgramFiles -and (Test-Path "${env:ProgramFiles(x86)}")) {
              $candidates += (Join-Path ${env:ProgramFiles(x86)} "Ollama\ollama.exe")
            }
            foreach ($candidate in $candidates) {
              if ($candidate -and (Test-Path $candidate)) {
                $ollamaExe = $candidate
                break
              }
            }
          }
          if (-not $ollamaExe) {
            $whereResult = & where.exe ollama 2>$null | Select-Object -First 1
            if ($whereResult) {
              $ollamaExe = $whereResult.Trim()
            }
          }
          if (-not $ollamaExe) {
            throw "Unable to locate ollama.exe after installation."
          }
          "OLLAMA_EXE=$ollamaExe" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set runtime flavor
        shell: pwsh
        run: |
          "CONNECTOR_AGENT_RUNTIME_FLAVOR=${{ matrix.runtime_flavor }}" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Materialize runtime YOLO checkpoint
        shell: pwsh
        run: |
          python -c "from pathlib import Path; import shutil; from src.model_artifacts import resolve_local_pretrained_model, resolve_runtime_model; runtime=resolve_runtime_model('assets/models/yolo26x_local_pretrained.pt'); target=resolve_local_pretrained_model(); target.parent.mkdir(parents=True, exist_ok=True); shutil.copy2(str(runtime), str(target)) if Path(runtime) != target else None; print(f'Runtime model: {runtime}'); print(f'Local slot: {target}')"

      - name: Pipeline quality gate (app, smart)
        shell: pwsh
        run: scripts\pipeline_quality_gate.ps1 -Stage ci-smart -Target app

      - name: Preflight CUDA app runtime
        if: matrix.require_cuda_wheel == '1'
        shell: cmd
        run: python scripts/preflight_cuda_app.py --model assets/models/yolo26x_local_pretrained.pt --require-cuda-wheel

      - name: Verify runtime YOLO loads
        shell: cmd
        run: python -c "from src.model_artifacts import resolve_runtime_model; from ultralytics import YOLO; p=resolve_runtime_model('assets/models/yolo26x_local_pretrained.pt'); m=YOLO(str(p)); print('Runtime model:', p); print('YOLO classes:', len(m.names))"

      - name: Build onefile app EXE with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist --workpath build-app --clean

      - name: Verify app EXE built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\connector_vision_agent.exe")) {
            throw "App build failed - EXE not found at dist\\connector_vision_agent.exe"
          }

      - name: Assemble full app folder
        shell: pwsh
        run: |
          $pkg = "${{ matrix.package_root }}"
          if (Test-Path $pkg) {
            Remove-Item -LiteralPath $pkg -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          Copy-Item "dist\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe" -Force
          Copy-Item "assets\launchers\start_agent.bat" "$pkg\start_agent.bat"
          if (Test-Path "install_first_time.bat") { Copy-Item "install_first_time.bat" "$pkg\install_first_time.bat" }
          Copy-Item "assets\launchers\stop_ollama.bat" "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\restore_ollama_stage.ps1" "$pkg\restore_ollama_stage.ps1"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "assets\launchers\PLACE_APP_HERE.txt" "$pkg\PLACE_APP_HERE.txt"
          New-Item -ItemType Directory -Path "$pkg\assets" -Force | Out-Null
          Copy-Item "assets\config.json" "$pkg\assets\config.json" -Force
          Copy-Item "assets\sop_steps.json" "$pkg\assets\sop_steps.json" -Force
          Copy-Item "assets\models" "$pkg\assets\models" -Recurse -Force
          if ($env:OLLAMA_EXE -and (Test-Path $env:OLLAMA_EXE)) {
            Copy-Item $env:OLLAMA_EXE "$pkg\ollama.exe" -Force
          }
          Set-Content -LiteralPath "$pkg\runtime_flavor.txt" -Value "${{ matrix.runtime_flavor }}" -Encoding UTF8
          if (Test-Path "README_INSTALL_EN.md") { Copy-Item "README_INSTALL_EN.md" "$pkg\README_INSTALL_EN.md" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$pkg\README.md" }

      - name: Upload full app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_root }}/
          retention-days: 90

  publish-release:
    name: Publish GitHub Release bundle
    if: startsWith(github.ref, 'refs/tags/')
    needs: [prepare-llm-models, build-app]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download CPU app pack
        uses: actions/download-artifact@v4
        with:
          name: connector-agent-app-cpu
          path: connector_agent_app_cpu

      - name: Download GPU app pack
        uses: actions/download-artifact@v4
        with:
          name: connector-agent-app-gpu
          path: connector_agent_app_gpu

      - name: Download LLM cache
        uses: actions/download-artifact@v4
        with:
          name: connector-agent-llm-v7-cache
          path: ollama_artifact_stage

      - name: Assemble release bundle zips
        shell: pwsh
        run: |
          $bundleDir = "release_bundle"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          python scripts/package_ollama_models.py zipdir --source connector_agent_app_cpu --output "$bundleDir/connector-agent-app-cpu.zip"
          python scripts/package_ollama_models.py zipdir --source connector_agent_app_gpu --output "$bundleDir/connector-agent-app-gpu.zip"
          python scripts/package_ollama_models.py zipdir --source ollama_artifact_stage --output "$bundleDir/connector-agent-llm-local-cache.zip"
          Copy-Item "assets/launchers/INSTALL_GUIDE.txt" "$bundleDir/INSTALL_GUIDE.txt" -Force
          Copy-Item "assets/launchers/MERGE_GUIDE.txt" "$bundleDir/MERGE_GUIDE.txt" -Force
          if (Test-Path "docs/V7_0_0_FOCUS.md") {
            Copy-Item "docs/V7_0_0_FOCUS.md" "$bundleDir/V7_0_0_FOCUS.md" -Force
          }
          Get-ChildItem -LiteralPath $bundleDir -File | ForEach-Object {
            Write-Host ("[release-bundle] {0} {1:N0} bytes" -f $_.Name, $_.Length)
          }

      - name: Publish release assets (split <=2GB)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $notes = @"
          ## Connector Vision SOP Agent ${{ github.ref_name }}

          Complete offline deployment pack:
          - **connector-agent-app-cpu.zip** — EXE + CPU PyTorch + ollama.exe + YOLO
          - **connector-agent-app-gpu.zip** — EXE + CUDA PyTorch + ollama.exe + YOLO
          - **connector-agent-llm-local-cache.zip** — Ollama blobs for **qwen3:8b** + **gemma4:9b**

          1. Extract one app zip (cpu or gpu) to your deployment root.
          2. Extract the LLM zip into the same root (`ollama_models/` or `llm_stage/`).
          3. Run `install_first_time.bat` once, then `start_agent.bat`.

          Large assets are split into <=2GB parts. Use `restore_ollama_stage.ps1` or follow MERGE_GUIDE.txt.
          "@
          python scripts/publish_release_bundle.py `
            --source-dir "release_bundle" `
            --repo "${{ github.repository }}" `
            --tag "${{ github.ref_name }}" `
            --title "${{ github.ref_name }} — SOP Generate Ollama AI (full pack)" `
            --notes $notes `
            --asset-prefix "connector-agent-${{ github.ref_name }}" `
            > release_publish_result.json
          Get-Content release_publish_result.json

      - name: Upload release publish result
        uses: actions/upload-artifact@v4
        with:
          name: release-publish-result-${{ github.ref_name }}
          path: release_publish_result.json
          retention-days: 14
