name: Build Connector Vision App Pack

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "tests/**"
      - "assets/config.json"
      - "assets/sop_steps.json"
      - "assets/launchers/**"
      - "assets/models/*.pt"
      - "build_exe.spec"
      - "scripts/pyinstaller_support.py"
      - "scripts/preflight_cuda_app.py"
      - "scripts/preflight_cuda_pretrain.py"
      - "scripts/preflight_gui_runtime.py"
      - "scripts/preflight_pretrain_runtime.py"
      - "scripts/pipeline_quality_gate.ps1"
      - "src/model_artifacts.py"
      - "requirements-common.txt"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "scripts/preflight_release.ps1"
      - "scripts/assemble_release_pack.ps1"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-app:
    name: App pack
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 2

      - name: Require CUDA wheel for app fine-tuning
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "CUDA_WHEEL_REQUIRED=1"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-common.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-common.txt
          python -m pip install --force-reinstall --index-url https://download.pytorch.org/whl/cu121 torch==2.3.1 torchvision==0.18.1
          python -m pip install -r requirements-dev.txt
          python -m pip install --force-reinstall --no-cache-dir numpy==1.26.4

      - name: Ensure YOLO26x base weights exist
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt')"
          }
          if (Test-Path "assets\models\yolo26x_local_pretrained.pt") {
            Write-Host "Local pretrained fine-tune seed is present."
          }
          else {
            throw "Missing assets/models/yolo26x_local_pretrained.pt"
          }

      - name: Pipeline quality gate (app, smart)
        shell: pwsh
        run: scripts\pipeline_quality_gate.ps1 -Stage ci-smart -Target app

      - name: Verify YOLO26x loads
        shell: cmd
        run: python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('YOLO26x classes:', len(m.names))"

      - name: Build EXE with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist --clean

      - name: Verify EXE built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\connector_vision_agent.exe")) {
            throw "EXE build failed - file not found"
          }

      - name: Download Ollama binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          if (-not (Test-Path "ollama_bin\ollama.exe")) {
            throw "ollama.exe not found in downloaded archive"
          }

      - name: Assemble app bundle
        shell: pwsh
        run: |
          $pkg = "connector_agent_app"
          if (Test-Path $pkg) {
            Remove-Item -LiteralPath $pkg -Recurse -Force
          }

          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\ollama_models" -Force | Out-Null

          Copy-Item "dist\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe"
          Copy-Item "ollama_bin\ollama.exe" "$pkg\ollama.exe"
          Copy-Item "assets\config.json" "$pkg\config.json"
          Copy-Item "assets\config.json" "$pkg\assets\config.json"
          Copy-Item "assets\sop_steps.json" "$pkg\assets\sop_steps.json"
          Copy-Item "assets\models\yolo26x.pt" "$pkg\assets\models\yolo26x.pt"
          Copy-Item "assets\models\yolo26x_local_pretrained.pt" "$pkg\assets\models\yolo26x_local_pretrained.pt"
          Copy-Item "assets\launchers\start_agent.bat" "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat" "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "assets\launchers\PLACE_APP_HERE.txt" "$pkg\PLACE_APP_HERE.txt"
          Copy-Item "assets\launchers\PLACE_LLM_HERE.txt" "$pkg\ollama_models\PLACE_LLM_HERE.txt"
          if (Test-Path "README_INSTALL_EN.md") { Copy-Item "README_INSTALL_EN.md" "$pkg\README_INSTALL_EN.md" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$pkg\README.md" }

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-app
          path: connector_agent_app/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            connector_agent_app/connector_vision_agent.exe
            connector_agent_app/INSTALL_GUIDE.txt
            connector_agent_app/MERGE_GUIDE.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
