name: Build Connector Vision Release Pack

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight Tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html
          python -m pip install -r requirements-dev.txt

      - name: Run preflight release checks
        shell: pwsh
        run: scripts\preflight_release.ps1

  build-app:
    name: App Bundle
    runs-on: windows-latest
    needs: preflight
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html
          python -m pip install -r requirements-dev.txt

      - name: Ensure YOLO26x base weights exist
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            Write-Host "[INFO] yolo26x.pt not found - downloading COCO pretrained weights"
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt'); print('Copied', src)"
          }
          if (-not (Test-Path "assets\models\yolo26x_pretrained.pt")) {
            throw "Missing assets/models/yolo26x_pretrained.pt"
          }

      - name: Verify YOLO26x loads
        shell: cmd
        run: python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('[OK] YOLO26x classes='+str(len(m.names)))"

      - name: Build EXE (PyInstaller)
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist_build --clean

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist_build\connector_vision_agent.exe")) {
            throw "EXE build failed - file not found"
          }
          $mb = [math]::Round((Get-Item "dist_build\connector_vision_agent.exe").Length / 1MB, 1)
          Write-Host "[OK] connector_vision_agent.exe: $mb MB"

      - name: Download Ollama binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          if (-not (Test-Path "ollama_bin\ollama.exe")) { throw "ollama.exe not found" }

      - name: Assemble app bundle
        shell: pwsh
        run: |
          $pkg = "connector_agent_app"
          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\ollama_models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\pretrain_data" -Force | Out-Null

          Copy-Item "dist_build\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe"
          Copy-Item "ollama_bin\ollama.exe" "$pkg\ollama.exe"
          Copy-Item "assets\config.json" "$pkg\assets\config.json"
          Copy-Item "assets\sop_steps.json" "$pkg\assets\sop_steps.json"
          Copy-Item "assets\models\yolo26x.pt" "$pkg\assets\models\yolo26x.pt"
          Copy-Item "assets\models\yolo26x_pretrained.pt" "$pkg\assets\models\yolo26x_pretrained.pt"
          Copy-Item "assets\launchers\start_agent.bat" "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat" "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "assets\launchers\PLACE_LLM_HERE.txt" "$pkg\ollama_models\PLACE_LLM_HERE.txt"
          Copy-Item "assets\launchers\PLACE_PRETRAIN_DATA_HERE.txt" "$pkg\pretrain_data\PLACE_PRETRAIN_DATA_HERE.txt"
          Copy-Item "assets\launchers\PLACE_PRETRAIN_DATA_HERE.txt" "$pkg\PLACE_PRETRAIN_DATA_HERE.txt"
          Copy-Item "assets\launchers\PLACE_LLM_HERE.txt" "$pkg\PLACE_LLM_HERE.txt"
          Copy-Item "assets\launchers\PLACE_APP_HERE.txt" "$pkg\PLACE_APP_HERE.txt" -ErrorAction SilentlyContinue
          if (Test-Path "README_INSTALL_EN.md") { Copy-Item "README_INSTALL_EN.md" "$pkg\README_INSTALL_EN.md" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$pkg\README.md" }

          Write-Host "[OK] App bundle assembled -> $pkg"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-app
          path: connector_agent_app/
          retention-days: 90

  build-pretrain:
    name: Pretrain Bundle
    runs-on: windows-latest
    needs: preflight
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html
          python -m pip install -r requirements-dev.txt

      - name: Ensure YOLO26x base weights exist
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            Write-Host "[INFO] yolo26x.pt not found - downloading COCO pretrained weights"
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt'); print('Copied', src)"
          }
          if (-not (Test-Path "assets\models\yolo26x_pretrained.pt")) {
            throw "Missing assets/models/yolo26x_pretrained.pt"
          }

      - name: Build pretrain EXE (PyInstaller)
        shell: cmd
        run: pyinstaller pretrain_exe.spec --distpath dist_pretrain --clean

      - name: Verify pretrain EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist_pretrain\connector_pretrain.exe")) {
            throw "Pretrain EXE build failed - file not found"
          }

      - name: Assemble pretrain bundle
        shell: pwsh
        run: |
          $pkg = "connector_pretrain_bundle"
          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\pretrain_data" -Force | Out-Null

          Copy-Item "dist_pretrain\connector_pretrain.exe" "$pkg\connector_pretrain.exe"
          Copy-Item "assets\launchers\start_pretrain.bat" "$pkg\start_pretrain.bat"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "assets\launchers\PLACE_PRETRAIN_DATA_HERE.txt" "$pkg\pretrain_data\PLACE_PRETRAIN_DATA_HERE.txt"
          Copy-Item "assets\launchers\PLACE_PRETRAIN_DATA_HERE.txt" "$pkg\PLACE_PRETRAIN_DATA_HERE.txt"
          Copy-Item "assets\config.json" "$pkg\assets\config.json"
          Copy-Item "assets\models\yolo26x.pt" "$pkg\assets\models\yolo26x.pt"
          if (Test-Path "assets\models\yolo26x_pretrained.pt") {
            Copy-Item "assets\models\yolo26x_pretrained.pt" "$pkg\assets\models\yolo26x_pretrained.pt"
          }

          if (Test-Path "pretrain_data") {
            Copy-Item "pretrain_data\*" "$pkg\pretrain_data" -Recurse -Force
          } elseif (Test-Path "pretrain_data_test") {
            Copy-Item "pretrain_data_test\*" "$pkg\pretrain_data" -Recurse -Force
          } else {
            "No bundled pretrain data found." | Set-Content "$pkg\pretrain_data\PLACE_DATASET_HERE.txt" -Encoding UTF8
          }

          Write-Host "[OK] Pretrain bundle assembled -> $pkg"

      - name: Upload pretrain artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-pretrain
          path: connector_pretrain_bundle/
          retention-days: 90

  assemble-pack:
    name: Final Line Pack
    runs-on: windows-latest
    needs: [build-app, build-pretrain]
    permissions:
      contents: read
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: connector-agent-app
          path: artifacts/app

      - name: Download pretrain artifact
        uses: actions/download-artifact@v4
        with:
          name: connector-agent-pretrain
          path: artifacts/pretrain

      - name: Assemble final pack
        shell: pwsh
        run: |
          scripts\assemble_release_pack.ps1 `
            -AppRoot "artifacts\app\connector_agent_app" `
            -PretrainRoot "artifacts\pretrain\connector_pretrain_bundle" `
            -OutputRoot "connector_agent_pack"

      - name: Upload final pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-line-pack
          path: connector_agent_pack/
          retention-days: 90
