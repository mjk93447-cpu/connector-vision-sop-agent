name: Build Connector Vision App Packs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "tests/**"
      - "assets/config.json"
      - "assets/sop_steps.json"
      - "assets/launchers/**"
      - "assets/models/*.pt"
      - "build_exe.spec"
      - "scripts/pyinstaller_support.py"
      - "scripts/preflight_cuda_app.py"
      - "scripts/preflight_gui_runtime.py"
      - "scripts/pipeline_quality_gate.ps1"
      - "scripts/assemble_release_pack.ps1"
      - "scripts/build_release_artifacts.ps1"
      - "scripts/package_ollama_models.py"
      - "src/model_artifacts.py"
      - "requirements-common.txt"
      - "requirements-dev.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-app:
    name: App pack (${{ matrix.runtime_flavor }})
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime_flavor: cpu
            torch_index_url: https://download.pytorch.org/whl/cpu
            require_cuda_wheel: "0"
            artifact_name: connector-agent-app-cpu
            package_root: connector_agent_app_cpu
          - runtime_flavor: gpu
            torch_index_url: https://download.pytorch.org/whl/cu121
            require_cuda_wheel: "1"
            artifact_name: connector-agent-app-gpu
            package_root: connector_agent_app_gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-common.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-common.txt
          python -m pip install --force-reinstall --index-url ${{ matrix.torch_index_url }} torch==2.3.1 torchvision==0.18.1
          python -m pip install -r requirements-dev.txt
          python -m pip install --force-reinstall --no-cache-dir numpy==1.26.4

      - name: Install Ollama runtime
        shell: pwsh
        run: |
          if (-not (Get-Command ollama -ErrorAction SilentlyContinue)) {
            winget install Ollama.Ollama --silent --accept-source-agreements --accept-package-agreements
          }
          $cmd = Get-Command ollama -ErrorAction SilentlyContinue
          if (-not $cmd) {
            throw "Unable to locate ollama.exe after installation."
          }
          "OLLAMA_EXE=$($cmd.Source)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set runtime flavor
        shell: pwsh
        run: |
          "CONNECTOR_AGENT_RUNTIME_FLAVOR=${{ matrix.runtime_flavor }}" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Materialize runtime YOLO checkpoint
        shell: pwsh
        run: |
          python -c "from pathlib import Path; import shutil; from src.model_artifacts import resolve_local_pretrained_model, resolve_runtime_model; runtime=resolve_runtime_model('assets/models/yolo26x_local_pretrained.pt'); target=resolve_local_pretrained_model(); target.parent.mkdir(parents=True, exist_ok=True); shutil.copy2(str(runtime), str(target)) if Path(runtime) != target else None; print(f'Runtime model: {runtime}'); print(f'Local slot: {target}')"

      - name: Pipeline quality gate (app, smart)
        shell: pwsh
        run: scripts\pipeline_quality_gate.ps1 -Stage ci-smart -Target app

      - name: Preflight CUDA app runtime
        if: matrix.require_cuda_wheel == '1'
        shell: cmd
        run: python scripts/preflight_cuda_app.py --model assets/models/yolo26x_local_pretrained.pt --require-cuda-wheel

      - name: Verify runtime YOLO loads
        shell: cmd
        run: python -c "from src.model_artifacts import resolve_runtime_model; from ultralytics import YOLO; p=resolve_runtime_model('assets/models/yolo26x_local_pretrained.pt'); m=YOLO(str(p)); print('Runtime model:', p); print('YOLO classes:', len(m.names))"

      - name: Build onefile app EXE with PyInstaller
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist --workpath build-app --clean

      - name: Verify app EXE built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\connector_vision_agent.exe")) {
            throw "App build failed - EXE not found at dist\\connector_vision_agent.exe"
          }

      - name: Assemble full app folder
        shell: pwsh
        run: |
          $pkg = "${{ matrix.package_root }}"
          if (Test-Path $pkg) {
            Remove-Item -LiteralPath $pkg -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          Copy-Item "dist\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe" -Force
          Copy-Item "assets\launchers\start_agent.bat" "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat" "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\restore_ollama_stage.ps1" "$pkg\restore_ollama_stage.ps1"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt" "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt" "$pkg\MERGE_GUIDE.txt"
          Copy-Item "assets\launchers\PLACE_APP_HERE.txt" "$pkg\PLACE_APP_HERE.txt"
          New-Item -ItemType Directory -Path "$pkg\assets" -Force | Out-Null
          Copy-Item "assets\config.json" "$pkg\assets\config.json" -Force
          Copy-Item "assets\sop_steps.json" "$pkg\assets\sop_steps.json" -Force
          Copy-Item "assets\models" "$pkg\assets\models" -Recurse -Force
          if ($env:OLLAMA_EXE -and (Test-Path $env:OLLAMA_EXE)) {
            Copy-Item $env:OLLAMA_EXE "$pkg\ollama.exe" -Force
          }
          Set-Content -LiteralPath "$pkg\runtime_flavor.txt" -Value "${{ matrix.runtime_flavor }}" -Encoding UTF8
          if (Test-Path "README_INSTALL_EN.md") { Copy-Item "README_INSTALL_EN.md" "$pkg\README_INSTALL_EN.md" }
          if (Test-Path "README.md") { Copy-Item "README.md" "$pkg\README.md" }

      - name: Upload full app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_root }}/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.package_root }}/INSTALL_GUIDE.txt
            ${{ matrix.package_root }}/MERGE_GUIDE.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
