name: Build Connector Vision Agent (All-in-One)

# All-in-One build: EXE + Ollama + YOLO26x + OCR (winsdk/easyocr) + Granite Vision 3.2-2b LLM
#
# MANDATORY: YOLO26x (yolo26x.pt) ONLY. YOLOv8/v9/v10/v11 ABSOLUTELY FORBIDDEN.
#
# Produces 2 artifacts:
#   connector-agent-app  ~500 MB  EXE + Ollama + YOLO26x + OCR + config
#   connector-agent-llm  ~2.0 GB  IBM Granite Vision 3.2-2b model blobs
#
# On-site deployment:
#   1. Extract connector-agent-app.zip → connector_agent\ folder
#   2. Extract connector-agent-llm.zip → copy blobs\ and manifests\ into
#      connector_agent\ollama_models\
#   3. Double-click connector_agent\start_agent.bat

on:
  workflow_dispatch:

# Opt into Node.js 24 now (GitHub will force this from 2026-06-02)
# Affects: actions/checkout@v4, actions/setup-python@v5, actions/upload-artifact@v4
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # Job 0: YOLO26x OLED Pretrain — oled_synthetic (default) or pcb_components
  #         Produces yolo26x_pretrained.pt artifact for build-app
  # ─────────────────────────────────────────────────────────────────────
  pretrain:
    name: YOLO26x OLED Pretrain (oled_synthetic / pcb_components)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html

      - name: Prepare yolo26x.pt base model
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path('yolo26x.pt'); pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt'); print('Copied', src)"
          }
          Write-Host "[OK] yolo26x.pt ready"

      - name: Run OLED pretrain (oled_synthetic or pcb_components)
        shell: bash
        timeout-minutes: 30
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
        run: |
          if [ -n "$ROBOFLOW_API_KEY" ]; then
            echo "[INFO] ROBOFLOW_API_KEY found — using pcb_components source"
            python scripts/run_pretrain.py --source pcb_components --max-samples 500 --epochs 30 --batch 4 --imgsz 640 --output-dir pretrain_data --report PRETRAIN_REPORT.md
          else
            echo "[INFO] No ROBOFLOW_API_KEY — using oled_synthetic source (300 images, OLED line)"
            python scripts/run_pretrain.py --source oled_synthetic --n-images 300 --epochs 30 --batch 4 --imgsz 640 --output-dir pretrain_data --report PRETRAIN_REPORT.md
          fi

      - name: Verify pretrained weights
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x_pretrained.pt")) {
            throw "yolo26x_pretrained.pt not found after pretrain"
          }
          $mb = [math]::Round((Get-Item "assets\models\yolo26x_pretrained.pt").Length / 1MB, 1)
          Write-Host "[OK] yolo26x_pretrained.pt: $mb MB"
          python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x_pretrained.pt'); print('[OK] pretrained model classes='+str(len(m.names)))"

      - name: Upload pretrained weights artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-pretrained
          path: assets/models/yolo26x_pretrained.pt
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # Job 1: EXE + Ollama + YOLO26x + OCR + config files
  # ─────────────────────────────────────────────────────────────────────
  build-app:
    name: App (EXE + Ollama + YOLO26x + OCR)
    runs-on: windows-latest
    needs: [pretrain]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -f https://download.pytorch.org/whl/torch_stable.html
          python -m pip install -r requirements-dev.txt

      - name: Prepare yolo26x.pt (YOLO26x only — YOLOv8/v9/v10/v11 forbidden)
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\models\yolo26x.pt")) {
            Write-Host "[INFO] yolo26x.pt not found — downloading COCO pretrained weights"
            python -c "from ultralytics import YOLO; import shutil, pathlib; m=YOLO('yolo26x.pt'); src=pathlib.Path(getattr(m,'ckpt_path','yolo26x.pt')); src=pathlib.Path('yolo26x.pt') if not src.exists() else src; pathlib.Path('assets/models').mkdir(parents=True, exist_ok=True); shutil.copy2(str(src), 'assets/models/yolo26x.pt'); print('Copied', src)"
          } else {
            Write-Host "[INFO] yolo26x.pt found — using existing file"
          }
          $sz = [math]::Round((Get-Item "assets\models\yolo26x.pt").Length / 1MB, 1)
          Write-Host "[INFO] yolo26x.pt: $sz MB"

      - name: Download pretrained weights from pretrain job
        uses: actions/download-artifact@v4
        with:
          name: connector-agent-pretrained
          path: pretrain_artifact

      - name: Install pretrained weights
        shell: pwsh
        run: |
          $src = "pretrain_artifact\yolo26x_pretrained.pt"
          if (Test-Path $src) {
            Copy-Item $src "assets\models\yolo26x_pretrained.pt"
            $mb = [math]::Round((Get-Item "assets\models\yolo26x_pretrained.pt").Length / 1MB, 1)
            Write-Host "[OK] yolo26x_pretrained.pt installed: $mb MB"
          } else {
            Write-Host "[WARN] pretrained weights not found in artifact — skipping"
          }

      - name: Verify YOLO26x loads
        shell: cmd
        run: python -c "from ultralytics import YOLO; m=YOLO('assets/models/yolo26x.pt'); print('[OK] YOLO26x classes='+str(len(m.names)))"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -q --tb=short --no-header --timeout=60

      - name: Run integration tests
        # Integration tests run actual YOLO training (90-180s CPU) — needs longer timeout
        run: python -m pytest tests/integration/ -q --tb=short --no-header --timeout=300

      - name: Build EXE (PyInstaller)
        shell: cmd
        run: pyinstaller build_exe.spec --distpath dist_build --clean

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist_build\connector_vision_agent.exe")) {
            throw "EXE build failed — file not found"
          }
          $mb = [math]::Round((Get-Item "dist_build\connector_vision_agent.exe").Length / 1MB, 1)
          Write-Host "[OK] EXE: $mb MB"

      - name: Download Ollama binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          if (-not (Test-Path "ollama_bin\ollama.exe")) { throw "ollama.exe not found" }
          $mb = [math]::Round((Get-Item "ollama_bin\ollama.exe").Length / 1MB, 1)
          Write-Host "[OK] ollama.exe: $mb MB"

      - name: Assemble package
        shell: pwsh
        run: |
          $pkg = "connector_agent"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\assets\models" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\ollama_models" -Force | Out-Null

          # Executables
          Copy-Item "dist_build\connector_vision_agent.exe" "$pkg\connector_vision_agent.exe"
          Copy-Item "ollama_bin\ollama.exe"                 "$pkg\ollama.exe"

          # Config: enable LLM (IBM Granite Vision 3.2-2b via Ollama /api/chat)
          $cfg = Get-Content assets\config.json -Raw | ConvertFrom-Json
          $cfg.llm.enabled    = $true
          $cfg.llm.backend    = "ollama"
          $cfg.llm.model_path = "ibm/granite3.2-vision:2b"
          $cfg.llm.http_url   = "http://127.0.0.1:11434/api/chat"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "$pkg\assets\config.json" -Encoding UTF8

          # SOP config + YOLO26x model (MANDATORY: YOLO26x only)
          Copy-Item "assets\sop_steps.json"            "$pkg\assets\sop_steps.json"
          Copy-Item "assets\models\yolo26x.pt"         "$pkg\assets\models\yolo26x.pt"
          if (Test-Path "assets\models\yolo26x_pretrained.pt") {
            Copy-Item "assets\models\yolo26x_pretrained.pt" "$pkg\assets\models\yolo26x_pretrained.pt"
            $mb = [math]::Round((Get-Item "assets\models\yolo26x_pretrained.pt").Length / 1MB, 1)
            Write-Host "[OK] yolo26x_pretrained.pt (GUI-specialized): $mb MB"
          }

          # Launchers + documentation
          Copy-Item "assets\launchers\start_agent.bat"    "$pkg\start_agent.bat"
          Copy-Item "assets\launchers\stop_ollama.bat"    "$pkg\stop_ollama.bat"
          Copy-Item "assets\launchers\INSTALL_GUIDE.txt"  "$pkg\INSTALL_GUIDE.txt"
          Copy-Item "assets\launchers\MERGE_GUIDE.txt"    "$pkg\MERGE_GUIDE.txt"
          foreach ($f in @("README.md", "TEST_REPORT.md")) {
            if (Test-Path $f) { Copy-Item $f "$pkg\$f" }
          }

          # LLM model placeholder
          "Extract connector-agent-llm artifact here (blobs\ and manifests\ folders)." |
            Set-Content "$pkg\ollama_models\PLACE_LLM_HERE.txt" -Encoding UTF8

          Write-Host ""
          Write-Host "=== connector_agent/ package manifest ==="
          Get-ChildItem $pkg -Recurse |
            Where-Object { -not $_.PSIsContainer } |
            Select-Object @{N="File";E={$_.FullName.Replace((Resolve-Path $pkg).Path+"\","")}},
                          @{N="MB";E={[math]::Round($_.Length / 1MB, 2)}} |
            Format-Table -AutoSize

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-app
          path: connector_agent/
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: IBM Granite Vision 3.2-2b model blobs (~2.0 GB)
  #         Separate job due to disk space constraints
  # ─────────────────────────────────────────────────────────────────────
  build-llm:
    name: LLM (Granite Vision 3.2-2b model blobs)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check disk space
        shell: pwsh
        run: |
          $free = [math]::Round((Get-PSDrive C).Free / 1GB, 2)
          Write-Host "Free disk: $free GB"
          if ($free -lt 6) { throw "Insufficient disk — need 6 GB+ (current: $free GB)" }

      - name: Download Ollama binary
        shell: pwsh
        run: |
          $uri = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $uri -OutFile ollama.zip -UseBasicParsing
          Expand-Archive ollama.zip -DestinationPath ollama_bin -Force
          Write-Host "[OK] Ollama ready"

      - name: Set model storage path
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:GITHUB_WORKSPACE "ollama_models"
          New-Item -ItemType Directory -Path $modelDir -Force | Out-Null
          "OLLAMA_MODELS=$modelDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "OLLAMA_MODELS=$modelDir"

      - name: Start Ollama server
        shell: pwsh
        run: |
          $env:OLLAMA_HOST = "127.0.0.1:11434"
          Start-Process "ollama_bin\ollama.exe" -ArgumentList "serve" -WindowStyle Hidden
          Write-Host "Waiting for Ollama to start (20 seconds)..."
          Start-Sleep -Seconds 20
          Write-Host "[OK] Ollama server ready"

      - name: Pull Granite Vision 3.2-2b (~2.0 GB)
        shell: pwsh
        run: |
          $env:OLLAMA_HOST = "127.0.0.1:11434"
          Write-Host "Downloading IBM Granite Vision 3.2-2b (Ollama registry, ~2.0 GB)..."
          & ollama_bin\ollama.exe pull ibm/granite3.2-vision:2b
          if ($LASTEXITCODE -ne 0) { throw "Model download failed (exit $LASTEXITCODE)" }
          Write-Host "[OK] Download complete"
          & ollama_bin\ollama.exe list

      - name: Verify model blobs
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:GITHUB_WORKSPACE "ollama_models"
          $files = Get-ChildItem $modelDir -Recurse -File
          $files | Select-Object Name, @{N="MB";E={[math]::Round($_.Length/1MB,1)}} | Format-Table
          $gb = ($files | Measure-Object Length -Sum).Sum / 1GB
          Write-Host ("Model total size: {0:F2} GB" -f $gb)
          if ($gb -lt 1.0) { throw "Model size too small — download may have failed" }

      - name: Upload LLM artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-agent-llm
          path: ollama_models/
          retention-days: 90
